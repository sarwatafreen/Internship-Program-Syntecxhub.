<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Toggle | Project 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <div class="header">
        <h1>Theme Switcher</h1>
        <label class="theme-switch">
          <input type="checkbox" id="checkbox">
          <div class="slider">
            <span class="icon sun">☀️</span>
            <span class="icon moon">🌙</span>
          </div>
        </label>
      </div>
      
      <p>This project demonstrates how to implement a persistent dark and light mode using CSS variables and LocalStorage.</p>
      
      <button class="main-btn" id="actionBtn">Action Button</button>

      <!-- <button class="main-btn">Action Button</button> -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
