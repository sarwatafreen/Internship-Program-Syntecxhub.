 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Kanban Board</h1>

  <div class="board">
    
    <div class="column" id="todo">
      <h2>To-Do</h2>
      <button onclick="addTask('todo')">+ Add Task</button>
      <div class="tasks" ondragover="allowDrop(event)" ondrop="drop(event, 'todo')"></div>
    </div>

    <div class="column" id="doing">
      <h2>Doing</h2>
      <button onclick="addTask('doing')">+ Add Task</button>
      <div class="tasks" ondragover="allowDrop(event)" ondrop="drop(event, 'doing')"></div>
    </div>

    <div class="column" id="done">
      <h2>Done</h2>
      <button onclick="addTask('done')">+ Add Task</button>
      <div class="tasks" ondragover="allowDrop(event)" ondrop="drop(event, 'done')"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
